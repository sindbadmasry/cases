<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دردشة واتساب - احمد عبدالعال</title>
    <style>
        :root {
            /* ألوان واتساب ويب الأصلية - الوضع الفاتح */
            --wa-app-bg: #d1d7db;
            --wa-panel-bg: #efeae2;
            --wa-header-bg: #f0f2f5;
            --wa-sent-bg: #d9fdd3;
            --wa-received-bg: #ffffff;
            --wa-system-bg: #ffffff;
            --wa-primary-text: #111b21;
            --wa-secondary-text: #667781;
            --wa-icon-color: #54656f;
            --wa-border: #d1d7db;
            --wa-shadow: 0 1px 0.5px rgba(11,20,26,.13);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--wa-app-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* شريط التمرير المخصص لواتساب ويب */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(11, 20, 26, 0.2);
            border-radius: 3px;
        }

        .app-container {
            width: 100%;
            max-width: 1600px;
            height: 100vh;
            background-color: var(--wa-panel-bg);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            /* خلفية رسومات واتساب ويب الأصلية */
            background-image: url('https://web.whatsapp.com/img/bg-chat-tile-light_04fcacde539c58cca6745483d4858c52.png');
            background-repeat: repeat;
            background-size: 400px;
            background-attachment: fixed;
            background-color: #efeae2;
        }

        @media (min-width: 1440px) {
            .app-container {
                height: calc(100vh - 40px);
                top: 20px;
                box-shadow: 0 6px 18px rgba(11,20,26,.05);
            }
        }

        .chat-header {
            background-color: var(--wa-header-bg);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--wa-border);
            height: 59px;
            z-index: 1000;
        }

        .header-left {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #dfe5e7;
            margin-left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-info h2 {
            font-size: 16px;
            font-weight: 400;
            color: var(--wa-primary-text);
            line-height: 21px;
        }

        .contact-info p {
            font-size: 13px;
            color: var(--wa-secondary-text);
            line-height: 20px;
        }

        .header-icons {
            display: flex;
            gap: 24px;
            color: var(--wa-icon-color);
            align-items: center;
        }

        .header-icons svg {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .chat-messages {
            flex: 1;
            padding: 20px 8%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .message {
            max-width: 65%;
            margin-bottom: 12px;
            padding: 6px 7px 8px 9px;
            border-radius: 7.5px;
            position: relative;
            font-size: 14.2px;
            line-height: 19px;
            word-wrap: break-word;
            box-shadow: var(--wa-shadow);
        }

        /* في اللغة العربية (RTL) المرسل يكون على اليسار والمستقبل على اليمين */
        .message-sent {
            align-self: flex-end; 
            background-color: var(--wa-sent-bg);
            border-top-left-radius: 0;
            margin-left: 15px; 
        }

        .message-received {
            align-self: flex-start;
            background-color: var(--wa-received-bg);
            border-top-right-radius: 0;
            margin-right: 15px; 
        }

        /* مثلثات الفقاعات */
        .message::before {
            content: "";
            position: absolute;
            top: 0;
            width: 8px;
            height: 13px;
        }

        .message-sent::before {
            left: -8px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 8 13" xmlns="http://www.w3.org/2000/svg"><path fill="%23d9fdd3" d="M5.188 1H0v11.156L7.984 2.195C8.807 1.455 8.164 1 7 1H5.188z"/></svg>');
        }

        .message-received::before {
            right: -8px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 8 13" xmlns="http://www.w3.org/2000/svg"><path fill="%23ffffff" d="M1.533 3.568 8 12.193V1H2.812C1.042 1 .474 2.026 1.533 3.568z"/></svg>');
        }

        .sender-name {
            font-size: 12.5px;
            font-weight: 500;
            margin-bottom: 4px;
            display: block;
        }

        .message-sent .sender-name { display: none; } 
        .message-received .sender-name { color: #53bdeb; }

        .message-text {
            color: var(--wa-primary-text);
            white-space: pre-wrap;
        }

        /* الميديا */
        .chat-media-img {
            max-width: 100%;
            max-height: 350px;
            border-radius: 6px;
            margin-top: 2px;
            margin-bottom: 4px;
            display: block;
            object-fit: cover;
            cursor: pointer;
        }

        .chat-media-audio {
            max-width: 100%;
            height: 40px;
            margin-top: 5px;
            margin-bottom: 5px;
            outline: none;
        }
        
        .chat-media-video {
            max-width: 100%;
            border-radius: 6px;
            margin-top: 2px;
            background: #000;
        }

        .file-error {
            color: var(--wa-secondary-text);
            font-size: 12.5px;
            margin-top: 5px;
            background: rgba(255,255,255,0.5);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--wa-border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message-time {
            font-size: 11px;
            color: var(--wa-secondary-text);
            float: left;
            margin-top: 4px;
            margin-right: 15px;
            margin-bottom: -4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* علامة الصح (للمرسل فقط) */
        .message-sent .message-time::before {
            content: '';
            display: inline-block;
            width: 16px;
            height: 11px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 16 11" width="16" height="11" xmlns="http://www.w3.org/2000/svg"><path d="M10.82 1.346 4.974 7.193 2.146 4.364 1.155 5.355 4.974 9.174l6.837-6.837-.991-.991z" fill="%2353bdeb"/><path d="M15.53 1.346l-.991-.991-6.837 6.837.991.991 6.837-6.837z" fill="%2353bdeb"/></svg>');
            background-repeat: no-repeat;
        }

        .message::after {
            content: "";
            display: table;
            clear: both;
        }

        .system-message {
            align-self: center;
            background-color: var(--wa-system-bg);
            color: var(--wa-secondary-text);
            font-size: 12.5px;
            padding: 6px 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 12px;
            max-width: 85%;
            box-shadow: var(--wa-shadow);
        }

        /* شريط الكتابة السفلي الوهمي */
        .chat-input-area {
            background-color: var(--wa-header-bg);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            height: 62px;
            z-index: 1000;
        }
        .chat-input-box {
            flex: 1;
            background-color: #ffffff;
            border-radius: 8px;
            height: 42px;
            padding: 9px 12px;
            color: var(--wa-secondary-text);
            font-size: 15px;
            display: flex;
            align-items: center;
        }
        .chat-input-icons svg {
            fill: var(--wa-icon-color);
            width: 26px;
            height: 26px;
            cursor: pointer;
        }
    </style>
</head>

٢٣‏/١‏/٢٠٢٥، ٩:٠٠ ص - أنت: صندوق الذهب 
*az  جولد*   
دا صندوق استثمارى بيستثمر فى الذهب ( عيار 24 بدرجه نقاء   ٩٩٩.٩ )   
حضرتك بتشتري عدد وثائق في الصندوق   
سعر الوثيقه بيتحرك حسب سعر الذهب المعلن على شاشة البورصه المصريه   
   
بتقدر تتابع العائد بتاعك بشكل يومى من خلال التغير فى سعر الوثيقة   
   
الصندوق متوافق مع احكام الشريعه الاسلامية و الذهب معتمد دوليا   
   
الصندوق يتيح الاستثمار باى مبلغ حيث لا يوجد حد ادنى للاستثمار ( تقدر فى اى وقت تزود اى مبلغ)   
   
يمكن الاسترداد بشكل نقدي او بشكل عيني ( حد ادنى سبيكة 50 جرام )   
   
اداء الصندوق منذ انشائه مايو 2023 حتى نهاية نوفمبر 2024: متوسط 51%   
و منذ بداية سنة 2024 حتي شهر نوفمبر 2024 : متوسط 17%

        // دالة لتحويل أسماء الملفات وجعلها تقرأ من مسار data
        function formatMediaContent(text) {
            if (text.includes('(الملف مرفق)') || text.includes('(file attached)')) {
                const fileMatch = text.match(/([a-zA-Z0-9_\-\.]+\.[a-zA-Z0-9]+)/);
                if (fileMatch) {
                    const fileName = fileMatch[1];
                    const ext = fileName.split('.').pop().toLowerCase();
                    // إضافة فولدر data قبل اسم الملف
                    const filePath = `data/${fileName}`;
                    
                    const imgExts = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
                    const audioExts = ['opus', 'mp3', 'wav', 'm4a', 'ogg', 'aac'];
                    const videoExts = ['mp4', 'mov', 'avi'];

                    if (imgExts.includes(ext)) {
                        return `<img src="${filePath}" class="chat-media-img" alt="صورة مرفقة" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend', '<div class=\\'file-error\\'>⚠️ لم يتم العثور على الصورة: ${filePath}</div>');">`;
                    } else if (audioExts.includes(ext)) {
                        return `<audio controls class="chat-media-audio"><source src="${filePath}">متصفحك لا يدعم تشغيل الصوت.</audio>`;
                    } else if (videoExts.includes(ext)) {
                        return `<video controls class="chat-media-video"><source src="${filePath}">متصفحك لا يدعم تشغيل الفيديو.</video>`;
                    } else {
                        return `📄 ملف مرفق: <a href="${filePath}" target="_blank">${fileName}</a>`;
                    }
                }
            }
            return text;
        }

        function parseAndRenderChat() {
            const chatBox = document.getElementById('chat-box');
            const lines = rawChatText.split('\n');
            
            const messageRegex = /^([٠-٩\d]+.*?،\s[٠-٩\d]+:[٠-٩\d]+\s[صمPMAM]+)\s-\s(.*?):\s(.*)$/;
            const systemRegex = /^([٠-٩\d]+.*?،\s[٠-٩\d]+:[٠-٩\d]+\s[صمPMAM]+)\s-\s(.*)$/;

            let currentMessage = null;
            const parsedMessages = [];

            lines.forEach(line => {
                let cleanLine = line.replace(/\\/g, '').trim();
                if (!cleanLine) return;

                const match = cleanLine.match(messageRegex);
                
                if (match) {
                    if (currentMessage) parsedMessages.push(currentMessage);
                    currentMessage = {
                        datetime: match[1],
                        sender: match[2],
                        text: match[3],
                        type: 'chat'
                    };
                } else {
                    const sysMatch = cleanLine.match(systemRegex);
                    if (sysMatch && !sysMatch[2].includes(':')) {
                        if (currentMessage) parsedMessages.push(currentMessage);
                        currentMessage = {
                            text: sysMatch[2],
                            type: 'system'
                        };
                    } else {
                        if (currentMessage) {
                            currentMessage.text += '\n' + cleanLine;
                        }
                    }
                }
            });
            if (currentMessage) parsedMessages.push(currentMessage);

            parsedMessages.forEach(msg => {
                if (msg.type === 'chat') {
                    let bubbleClass = msg.sender.includes('أنت') ? 'message-sent' : 'message-received';
                    let formattedText = formatMediaContent(msg.text);

                    const html = `
                        <div class="message ${bubbleClass}">
                            <span class="sender-name">${msg.sender}</span>
                            <div class="message-text">${formattedText}</div>
                            <span class="message-time">${msg.datetime}</span>
                        </div>
                    `;
                    chatBox.insertAdjacentHTML('beforeend', html);
                } else {
                    chatBox.insertAdjacentHTML('beforeend', `<div class="system-message">${msg.text}</div>`);
                }
            });
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        window.onload = parseAndRenderChat;
    </script>
